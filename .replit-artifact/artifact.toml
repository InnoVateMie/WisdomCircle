kind = "web"
previewPath = "/"
title = "The Wisdom Circle"
version = "1.0.0"
id = "artifacts/wisdom-circle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21315

[services.development]
run = "pnpm --filter @workspace/wisdom-circle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wisdom-circle", "run", "build" ]
publicDir = "artifacts/wisdom-circle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21315"
BASE_PATH = "/"
